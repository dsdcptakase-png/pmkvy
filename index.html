<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PMKVY Physical Inspection Form</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#eef2f7;
  padding-bottom:90px;
}
.header{
  background:#0d6efd;
  color:#fff;
  padding:14px;
  text-align:center;
  font-weight:600;
  position:sticky;
  top:0;
  z-index:100;
}
.container{
  max-width:760px;
  margin:auto;
  padding:12px;
}
.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
.card h3{
  margin:0 0 12px;
  color:#0d6efd;
  font-size:15px;
  border-bottom:1px solid #eee;
  padding-bottom:6px;
}
.field{margin-bottom:12px}
label{
  display:block;
  font-size:12px;
  font-weight:600;
  margin-bottom:4px;
  line-height:1.4;
}
label.req::after{
  content:" *";
  color:red;
}
input,select,textarea{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}
textarea{min-height:80px}
.batch-card{
  background:#f8f9fa;
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}
.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  padding:12px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.primary{
  width:100%;
  border:none;
  background:#0d6efd;
  color:#fff;
  padding:13px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.secondary{
  width:100%;
  border:none;
  background:#198754;
  color:#fff;
  padding:10px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="header">Annexure II: PHYSICAL INSPECTION FORM</div>

<div class="container">

<!-- BASIC -->
<div class="card">
<h3>Inspection and Centre Details</h3>

<div class="field">
<label>Inspector Name and Contact No</label>
<input id="inspector" oninput="saveLocal()">
</div>

<div class="field">
<label>Inspector Designation</label>
<input id="designation" oninput="saveLocal()">
</div>

<div class="field">
<label>Inspection Date</label>
<input type="date" id="date" oninput="saveLocal()">
</div>

<div class="field">
<label class="req">Inspection Start Time</label>
<input type="time" id="start" oninput="saveLocal()">
</div>

<div class="field">
<label class="req">Inspection End Time</label>
<input type="time" id="end" oninput="saveLocal()">
</div>

<div class="field">
<label>Training Center Name</label>
<input id="tcname" oninput="saveLocal()">
</div>

<div class="field">
<label>Training Center ID</label>
<input id="tcid" oninput="saveLocal()">
</div>

<div class="field">
<label>Training Provider Name</label>
<input id="tp" oninput="saveLocal()">
</div>

<div class="field">
<label>TC State and District</label>
<input id="district" oninput="saveLocal()">
</div>
</div>

<!-- INSPECTION -->
<div class="card">
<h3>Inspection Details</h3>

<div class="field">
<label>Is the TC found at same address as on SIDH?</label>
<select id="sidh" onchange="saveLocal()">
<option>Yes - 1</option>
<option>Nearby - 2</option>
<option>Closed - 3</option>
<option>No - 0</option>
</select>
</div>

<div class="field">
<label>Is TC SPOC available at the centre?</label>
<select id="spoc" onchange="saveLocal()">
<option>Yes-1</option>
<option>No-0</option>
</select>
</div>

<div class="field">
<label>PMKVY Branding Available Outside and Inside the centre?</label>
<select id="branding" onchange="saveLocal()">
<option>Both - 1</option>
<option>Partial - 2</option>
<option>Not Available - 0</option>
</select>
</div>
</div>

<!-- NON COMPLIANCE -->
<div class="card">
<h3>Non-Compliance Observed at the Centre</h3>

<div class="field">
<label>Unethical Practices (Such as subletting, offering or demanding undue favours in cash or kind to any stakeholder)</label>
<select id="nc1" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Fake Enrolments / Ghost Candidates (PMKVY non-registered students found in ongoing PMKVY class)</label>
<select id="nc2" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Mismatch between candidates available at centre and Attendance Portal / AEBAS</label>
<select id="nc3" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Non-Availability of Mandatory Tools, Equipment or Infrastructure</label>
<select id="nc4" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Training not being conducted at the time of visit as per PMKVY guidelines (Batch time / schedule not followed)</label>
<select id="nc5" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Batch merged of Different Job Roles</label>
<select id="nc6" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Batch merged of Same Job Roles</label>
<select id="nc7" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Non-Availability of Certified Trainers</label>
<select id="nc8" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Non-Distribution of Handbook to the Trainees</label>
<select id="nc9" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Non Usage / Non Installation of AEBAS for recording Trainees / Trainers attendance</label>
<select id="nc10" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Enrolment of Candidates not fulfilling prerequisites of the Job Role</label>
<select id="nc11" onchange="saveLocal()"><option>No</option><option>Yes</option></select>
</div>

<div class="field">
<label>Additional Remarks – Non-Compliance</label>
<textarea id="ncRemarks" oninput="saveLocal()"></textarea>
</div>

<div class="field">
<label>Overall Centre Rating</label>
<select id="rating" onchange="saveLocal()">
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<div class="field">
<label>Remarks (Please add remarks based on inspection and details of non-compliance observed)</label>
<textarea id="remarks" oninput="saveLocal()"></textarea>
</div>
</div>

<!-- BATCH -->
<div class="card">
<h3>Inspection Details of Active Batches</h3>
<div id="batchContainer"></div>
<button class="secondary" type="button" onclick="addBatch()">+ Add Another Batch</button>
</div>

</div>

<div class="footer">
<button class="primary" id="subBtn" type="button" onclick="submitForm()">Submit & Save to Sheet</button>
</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzpTdptCzLhjnIjDjhrRMQSqh10qUIg6q11ewkhLlZ7RxAyhABbLxtehBHVT7IRrt0e/exec";

function v(id){ return document.getElementById(id).value; }

function saveLocal(){
const data={
inspector:v("inspector"),
designation:v("designation"),
date:v("date"),
startTime:v("start"),
endTime:v("end"),
tcName:v("tcname"),
tcId:v("tcid"),
tpName:v("tp"),
tcStateDistrict:v("district"),
sidh:v("sidh"),
spoc:v("spoc"),
branding:v("branding"),
nc1:v("nc1"),
nc2:v("nc2"),
nc3:v("nc3"),
nc4:v("nc4"),
nc5:v("nc5"),
nc6:v("nc6"),
nc7:v("nc7"),
nc8:v("nc8"),
nc9:v("nc9"),
nc10:v("nc10"),
nc11:v("nc11"),
ncRemarks:v("ncRemarks"),
rating:v("rating"),
remarks:v("remarks"),
batches:Array.from(document.querySelectorAll(".batch-card")).map(card=>({
id:card.querySelector(".b-id").value,
cand:card.querySelector(".b-cand").value,
trainer:card.querySelector(".b-trainer").value,
equip:card.querySelector(".b-equip").value,
aware:card.querySelector(".b-aware").value,
rem:card.querySelector(".b-rem").value
}))
};
localStorage.setItem("pmkvy_form_draft",JSON.stringify(data));
}

function loadLocal(){
const raw=localStorage.getItem("pmkvy_form_draft");
if(!raw){ addBatch(); return; }

const d=JSON.parse(raw);

for(let key in d){
if(document.getElementById(key)){
document.getElementById(key).value=d[key];
}
}

if(d.startTime) document.getElementById("start").value=d.startTime;
if(d.endTime) document.getElementById("end").value=d.endTime;
if(d.tcName) document.getElementById("tcname").value=d.tcName;
if(d.tcId) document.getElementById("tcid").value=d.tcId;
if(d.tpName) document.getElementById("tp").value=d.tpName;
if(d.tcStateDistrict) document.getElementById("district").value=d.tcStateDistrict;

if(d.batches && d.batches.length){
d.batches.forEach(b=>addBatch(b));
}else{
addBatch();
}
}

function addBatch(data={}){
const c=document.getElementById("batchContainer");
const n=document.querySelectorAll(".batch-card").length+1;

c.insertAdjacentHTML("beforeend",`
<div class="batch-card">
<b>Batch ${n}</b>

<div class="field">
<label>Batch ID</label>
<input class="b-id" value="${data.id||''}" oninput="saveLocal()">
</div>

<div class="field">
<label>No of Candidates Available / Enrolled</label>
<input class="b-cand" value="${data.cand||''}" oninput="saveLocal()">
</div>

<div class="field">
<label>Registered Trainer Available?</label>
<select class="b-trainer" onchange="saveLocal()">
<option ${data.trainer=="Yes"?"selected":""}>Yes</option>
<option ${data.trainer=="No"?"selected":""}>No</option>
<option ${data.trainer=="Others"?"selected":""}>Others</option>
</select>
</div>

<div class="field">
<label>Mandatory Lab Equipment Available?</label>
<select class="b-equip" onchange="saveLocal()">
<option ${data.equip=="Yes"?"selected":""}>Yes</option>
<option ${data.equip=="Partial"?"selected":""}>Partial</option>
<option ${data.equip=="No"?"selected":""}>No</option>
</select>
</div>

<div class="field">
<label>Candidates Aware About PMKVY and Course?</label>
<select class="b-aware" onchange="saveLocal()">
<option ${data.aware=="Yes"?"selected":""}>Yes</option>
<option ${data.aware=="Partially Aware"?"selected":""}>Partially Aware</option>
<option ${data.aware=="Not Aware"?"selected":""}>Not Aware</option>
</select>
</div>

<div class="field">
<label>Additional Remarks</label>
<input class="b-rem" value="${data.rem||''}" oninput="saveLocal()">
</div>
</div>
`);
saveLocal();
}

async function submitForm(){

if(!v("start") || !v("end")){
alert("Inspection Start Time and End Time are mandatory!");
return;
}

const btn=document.getElementById("subBtn");
btn.disabled=true;
btn.innerText="Saving Data & Generating PDF...";

saveLocal();
const data=JSON.parse(localStorage.getItem("pmkvy_form_draft"));

try{

const response=await fetch(WEB_APP_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify(data)
});

const result=await response.json();

if(result.result==="success"){

alert("Success! Data saved.");

if(result.pdf){

    // DIRECT DOWNLOAD PDF
    const a=document.createElement("a");
    a.href=result.pdf;
    a.target="_blank";
    a.rel="noopener";
    a.download="PMKVY_Inspection_Report.pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

}

localStorage.removeItem("pmkvy_form_draft");
setTimeout(()=>location.reload(),1500);

}else{
alert("Error: "+(result.error||"Unknown Error"));
}

}catch(e){
alert("Connection Error. Data may not be saved.");
}

btn.disabled=false;
btn.innerText="Submit & Save to Sheet";
}
</script>

</body>
</html>
